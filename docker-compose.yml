version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: oddigo_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}

  redis:
    image: redis:alpine
    container_name: oddigo_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  api:
    build: .
    container_name: oddigo_api
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
      - NODE_ENV=production
      - MONGO_URI=mongodb://${MONGO_USER:-root}:${MONGO_PASSWORD}@mongo:27017/oddigo?authSource=admin
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongo
      - redis

  user-app:
    build:
      context: ./frontend/user-app
      args:
        VITE_API_BASE_URL: http://localhost:3000/api
    container_name: oddigo_user_app
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - api

  worker-app:
    build:
      context: ./frontend/worker-app
      args:
        VITE_API_BASE_URL: http://localhost:3000/api
    container_name: oddigo_worker_app
    restart: always
    ports:
      - "5174:80"
    depends_on:
      - api

  admin-dashboard:
    build:
      context: ./frontend/admin-dashboard
      args:
        VITE_API_BASE_URL: http://localhost:3000/api
    container_name: oddigo_admin_dashboard
    restart: always
    ports:
      - "5175:80"
    depends_on:
      - api

volumes:
  mongo_data:
  redis_data:
